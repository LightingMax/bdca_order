<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单报销系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f5f5f5;
            padding-top: 20px;
        }
        .container {
            max-width: 800px;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 5px;
            padding: 25px;
            text-align: center;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:hover {
            border-color: #007bff;
            background-color: #f8f9fa;
        }
        .upload-area.highlight {
            border-color: #28a745;
            background-color: #e8f4ea;
        }
        .progress {
            display: none;
            margin: 20px 0;
        }
        .result-area {
            display: none;
            margin-top: 20px;
        }
        .file-item {
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        .nav-tabs {
            margin-bottom: 20px;
        }
        /* 添加动画效果 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        @keyframes slideIn {
            from { transform: translateX(-30px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        
        .animate-pulse {
            animation: pulse 1s infinite;
        }
        
        .animate-slide-in {
            animation: slideIn 0.4s ease-out;
        }
        
        .file-item {
            transition: all 0.3s ease;
        }
        
        .file-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 1000;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.5s ease;
            color: white;
        }
        
        .notification.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        .notification.success {
            background-color: #28a745;
        }
        
        .notification.warning {
            background-color: #ffc107;
            color: #212529;
        }
        
        .notification.error {
            background-color: #dc3545;
        }
        
        .notification.info {
            background-color: #17a2b8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4">打车行程单和发票文件处理系统</h1>
        
        <ul class="nav nav-tabs">
            <li class="nav-item">
                <a class="nav-link active" href="/">处理文件</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/statistics">统计数据</a>
            </li>
        </ul>
        
        <div class="upload-area" id="uploadArea">
            <h3>拖拽ZIP文件到此处或点击上传</h3>
            <p class="text-muted">支持的文件格式: .zip (可同时上传多个文件)</p>
            <input type="file" id="fileInput" accept=".zip" multiple style="display: none;">
        </div>
        
        <div id="fileList" class="mb-3" style="display: none;">
            <h4>选择的文件</h4>
            <ul class="list-group" id="selectedFiles"></ul>
        </div>
        
        <div class="progress">
            <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%"></div>
        </div>
        
        <div class="result-area">
            <h3>处理结果</h3>
            <div id="resultList" class="mt-3"></div>
            <div class="mt-3">
                <button id="printAllBtn" class="btn btn-primary me-2">打印全部</button>
                <button id="clearResultsBtn" class="btn btn-outline-secondary">清空结果</button>
            </div>
        </div>
    </div>
    
    <!-- 通知提示 -->
    <div id="notification" class="notification">
        <i class="bi bi-info-circle-fill me-2"></i> <span id="notificationMessage"></span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Bootstrap 图标 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');
            const progressBar = document.querySelector('.progress-bar');
            const progress = document.querySelector('.progress');
            const resultArea = document.querySelector('.result-area');
            const resultList = document.getElementById('resultList');
            const printAllBtn = document.getElementById('printAllBtn');
            const notification = document.getElementById('notification');
            const notificationMessage = document.getElementById('notificationMessage');
            
            let processedFiles = [];
            
            // 显示通知
            function showNotification(message, type = 'success', duration = 3000) {
                notification.className = 'notification ' + type;
                notificationMessage.textContent = message;
                
                // 设置图标
                let icon = 'info-circle-fill';
                if (type === 'success') icon = 'check-circle-fill';
                if (type === 'warning') icon = 'exclamation-triangle-fill';
                if (type === 'error') icon = 'x-circle-fill';
                
                // 更新图标
                const iconElement = notification.querySelector('i');
                iconElement.className = `bi bi-${icon} me-2`;
                
                notification.classList.add('show');
                setTimeout(() => {
                    notification.classList.remove('show');
                }, duration);
            }
            
            // 页面加载动画
            function initPageAnimations() {
                document.querySelector('h1').classList.add('animate-fade-in');
                document.querySelector('.nav-tabs').classList.add('animate-fade-in');
                document.querySelector('.nav-tabs').style.animationDelay = '0.1s';
                
                uploadArea.classList.add('animate-fade-in');
                uploadArea.style.animationDelay = '0.2s';
            }
            
            // 初始化页面动画
            initPageAnimations();
            
            // 点击上传区域触发文件选择
            uploadArea.addEventListener('click', function() {
                fileInput.click();
            });
            
            // 文件拖拽事件
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                uploadArea.addEventListener(eventName, preventDefaults, false);
            });
            
            function preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }
            
            ['dragenter', 'dragover'].forEach(eventName => {
                uploadArea.addEventListener(eventName, highlight, false);
            });
            
            ['dragleave', 'drop'].forEach(eventName => {
                uploadArea.addEventListener(eventName, unhighlight, false);
            });
            
            function highlight() {
                uploadArea.classList.add('highlight');
                // 添加脉冲动画
                uploadArea.classList.add('animate-pulse');
            }
            
            function unhighlight() {
                uploadArea.classList.remove('highlight');
                // 移除脉冲动画
                uploadArea.classList.remove('animate-pulse');
            }
            
            // 处理拖放的文件
            uploadArea.addEventListener('drop', handleDrop, false);
            
            function handleDrop(e) {
                const dt = e.dataTransfer;
                const files = dt.files;
                
                if (files.length > 0) {
                    handleFiles(files);
                }
            }
            
            // 处理选择的文件
            fileInput.addEventListener('change', function() {
                if (fileInput.files.length > 0) {
                    handleFiles(fileInput.files);
                }
            });
            
            // 处理文件上传
            function handleFiles(files) {
                if (files.length === 0) {
                    alert('请选择一个ZIP文件');
                    return;
                }
                
                // 验证所有文件都是ZIP格式
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    if (!file.name.toLowerCase().endsWith('.zip')) {
                        alert('请上传ZIP格式的文件');
                        return;
                    }
                }
                
                // 显示选择的文件列表
                const fileList = document.getElementById('fileList');
                const selectedFiles = document.getElementById('selectedFiles');
                selectedFiles.innerHTML = '';
                
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    const li = document.createElement('li');
                    li.className = 'list-group-item d-flex justify-content-between align-items-center animate-fade-in';
                    // 设置延迟动画，使文件依次显示
                    li.style.animationDelay = (i * 0.1) + 's';
                    li.innerHTML = `
                        <span>${file.name}</span>
                        <span class="badge bg-primary rounded-pill">${formatFileSize(file.size)}</span>
                    `;
                    selectedFiles.appendChild(li);
                }
                
                fileList.style.display = 'block';
                fileList.classList.add('animate-fade-in');
                
                uploadFiles(files);
            }
            
            // 格式化文件大小
            function formatFileSize(bytes) {
                if (bytes === 0) return '0 Bytes';
                const k = 1024;
                const sizes = ['Bytes', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            }
            
            // 上传文件到服务器
            function uploadFiles(files) {
                console.log('🚀 uploadFiles 开始，文件数量:', files.length);
                console.log('📊 上传前 processedFiles 长度:', processedFiles ? processedFiles.length : 'undefined');
                console.log('📊 上传前 resultList 内容长度:', resultList.innerHTML.length);
                
                const formData = new FormData();
                for (let i = 0; i < files.length; i++) {
                    formData.append('files', files[i]);
                }
                
                const xhr = new XMLHttpRequest();
                
                // 进度条显示
                progress.style.display = 'flex';
                console.log('⚠️  隐藏结果区域，但不清空内容');
                resultArea.style.display = 'none';
                
                xhr.upload.addEventListener('progress', function(e) {
                    if (e.lengthComputable) {
                        const percentComplete = (e.loaded / e.total) * 100;
                        progressBar.style.width = percentComplete + '%';
                        
                        // 添加进度条颜色变化
                        if (percentComplete < 30) {
                            progressBar.className = 'progress-bar progress-bar-striped progress-bar-animated bg-info';
                        } else if (percentComplete < 70) {
                            progressBar.className = 'progress-bar progress-bar-striped progress-bar-animated bg-primary';
                        } else {
                            progressBar.className = 'progress-bar progress-bar-striped progress-bar-animated bg-success';
                        }
                    }
                });
                
                xhr.addEventListener('load', function() {
                    if (xhr.status === 200) {
                        const response = JSON.parse(xhr.responseText);
                        
                        // 显示上传成功通知
                        showNotification('上传成功', 'success');
                        
                        displayResults(response);
                    } else {
                        let errorMessage = '上传失败';
                        try {
                            const response = JSON.parse(xhr.responseText);
                            errorMessage = response.error || errorMessage;
                        } catch (e) {}
                        showNotification(errorMessage, 'error');
                        progress.style.display = 'none';
                        document.getElementById('fileList').style.display = 'none';
                    }
                });
                
                xhr.addEventListener('error', function() {
                    showNotification('上传过程中发生错误', 'error');
                    progress.style.display = 'none';
                    document.getElementById('fileList').style.display = 'none';
                });
                
                xhr.open('POST', '/api/upload');
                xhr.send(formData);
            }
            
            // 显示处理结果
            function displayResults(response) {
                console.log('🔄 displayResults 被调用，响应:', response);
                console.log('📊 当前 processedFiles 长度:', processedFiles ? processedFiles.length : 'undefined');
                console.log('📊 显示结果前 resultList 内容长度:', resultList.innerHTML.length);
                
                progress.style.display = 'none';
                console.log('✅ 显示结果区域');
                resultArea.style.display = 'block';
                resultArea.classList.add('animate-fade-in');
                
                // 不清空之前的结果，而是追加新结果
                console.log('⚠️  注意：这里不会清空之前的结果！');
                console.log('📊 当前 resultList 内容:', resultList.innerHTML.substring(0, 100) + '...');
                // resultList.innerHTML = ''; // 注释掉这行，避免清空之前的结果
                
                // 隐藏文件列表
                document.getElementById('fileList').style.display = 'none';
                
                if (response.success && response.results) {
                    console.log('✅ 响应成功，开始处理结果');
                    
                    // 将新结果添加到现有结果中，而不是替换
                    if (typeof processedFiles === 'undefined') {
                        console.log('🆕 processedFiles 未定义，初始化为空数组');
                        processedFiles = [];
                    }
                    
                    console.log('📥 添加新结果前，processedFiles 长度:', processedFiles.length);
                    console.log('📥 添加新结果前，processedFiles 内容:', JSON.stringify(processedFiles));
                    
                    // 确保新结果被正确添加
                    const newResults = response.results || [];
                    processedFiles = processedFiles.concat(newResults);
                    
                    console.log('📤 添加新结果后，processedFiles 长度:', processedFiles.length);
                    console.log('📤 添加新结果后，processedFiles 内容:', JSON.stringify(processedFiles));
                    
                    // 显示本次处理结果统计
                    const newFilesCount = newResults.length;
                    const newAmount = response.total_amount || newResults.reduce((sum, result) => sum + (result.amount || 0), 0);
                    
                    // 计算累计统计 - 确保正确累加
                    const totalFiles = processedFiles.length;
                    const totalAmount = processedFiles.reduce((sum, result) => sum + (result.amount || 0), 0);
                    
                    console.log('📊 统计信息 - 本次:', newFilesCount, '累计:', totalFiles, '总金额:', totalAmount);
                    console.log('📊 详细统计 - 新结果:', newResults, '累计结果:', processedFiles);
                    
                    // 检查是否已经有统计摘要，如果有则更新，没有则创建新的
                    let summaryDiv = document.getElementById('current-summary');
                    if (!summaryDiv) {
                        summaryDiv = document.createElement('div');
                        summaryDiv.className = 'alert alert-success mb-3 animate-fade-in';
                        summaryDiv.id = 'current-summary';
                        resultList.appendChild(summaryDiv);
                    }
                    
                    // 添加重用文件信息和新处理订单信息
                    let summaryText = `本次处理 <strong>${newFilesCount}</strong> 个订单，金额: <strong>¥${newAmount.toFixed(2)}</strong>`;
                    summaryText += `<br><small>累计处理 <strong>${totalFiles}</strong> 个订单，总金额: <strong>¥${totalAmount.toFixed(2)}</strong></small>`;
                    
                    if (response.reused_files > 0 && response.new_results_count >= 0) {
                        summaryText += `<br><small>其中 ${response.reused_files} 个文件已上传过，重用了之前的处理结果</small>`;
                        
                        if (response.new_results_count > 0) {
                            summaryText += `<br><small>本次新处理 <strong>${response.new_results_count}</strong> 个订单，这些订单已计入统计</small>`;
                        } else {
                            summaryText += `<br><small class="text-warning">所有订单均为重复上传，统计数据未增加</small>`;
                        }
                    }
                    
                    summaryDiv.innerHTML = summaryText;
                    
                    // 显示文件重用详情 - 累积显示所有重用过的文件
                    if (response.file_details && (response.file_details.reused.length > 0 || response.file_details.processed.length > 0)) {
                        let fileDetailsDiv = document.getElementById('file-details-section');
                        if (!fileDetailsDiv) {
                            fileDetailsDiv = document.createElement('div');
                            fileDetailsDiv.className = 'mb-4 animate-fade-in';
                            fileDetailsDiv.style.animationDelay = '0.2s';
                            fileDetailsDiv.id = 'file-details-section';
                            resultList.appendChild(fileDetailsDiv);
                        }
                        
                        // 初始化全局重用文件数组（如果不存在）
                        if (typeof window.allReusedFiles === 'undefined') {
                            window.allReusedFiles = [];
                        }
                        
                        // 将新的重用文件添加到全局数组中（避免重复）
                        if (response.file_details.reused && response.file_details.reused.length > 0) {
                            response.file_details.reused.forEach(newReusedFile => {
                                // 检查是否已经存在（基于哈希值）
                                const exists = window.allReusedFiles.some(existingFile => 
                                    existingFile.hash === newReusedFile.hash
                                );
                                if (!exists) {
                                    window.allReusedFiles.push(newReusedFile);
                                }
                            });
                        }
                        
                        let fileDetailsHtml = '<h5>文件处理详情</h5>';
                        
                        // 新处理的文件
                        if (response.file_details.processed.length > 0) {
                            fileDetailsHtml += '<div class="mb-2"><strong>新处理的文件:</strong></div>';
                            fileDetailsHtml += '<ul class="list-group mb-3">';
                            response.file_details.processed.forEach((file, index) => {
                                const newBadge = file.new_result_count ? 
                                    `<span class="badge bg-success ms-2">+${file.new_result_count} 新订单</span>` : 
                                    '<span class="badge bg-secondary ms-2">无新订单</span>';
                                
                                fileDetailsHtml += `
                                    <li class="list-group-item d-flex justify-content-between align-items-center animate-slide-in" style="animation-delay: ${0.2 + index * 0.1}s">
                                        <div>
                                            <span>${file.filename} ${newBadge}</span>
                                            <small class="d-block text-muted">哈希: ${file.hash.substring(0, 8)}...${file.hash.substring(file.hash.length - 8)}</small>
                                        </div>
                                        <span class="badge bg-primary rounded-pill">${file.result_count} 个订单</span>
                                    </li>
                                `;
                            });
                            fileDetailsHtml += '</ul>';
                        }
                        
                        // 显示所有重用过的文件（累积显示）
                        if (window.allReusedFiles.length > 0) {
                            fileDetailsHtml += '<div class="mb-2"><strong>重用的文件 (累计):</strong></div>';
                            fileDetailsHtml += '<ul class="list-group">';
                            window.allReusedFiles.forEach((file, index) => {
                                const printStatus = file.print_status || 'unknown';
                                const lastPrintTime = file.last_print_time || '未打印';
                                const statusBadge = printStatus === 'printed' ? 
                                    '<span class="badge bg-success ms-2">已打印</span>' : 
                                    '<span class="badge bg-warning ms-2">未打印</span>';
                                
                                fileDetailsHtml += `
                                    <li class="list-group-item d-flex justify-content-between align-items-center animate-slide-in" style="animation-delay: ${0.2 + index * 0.1}s">
                                        <div>
                                            <span>${file.filename} ${statusBadge}</span>
                                            <small class="d-block text-muted">哈希: ${file.hash.substring(0, 8)}...${file.hash.substring(file.hash.length - 8)}</small>
                                            <small class="d-block text-muted">原上传时间: ${file.original_upload_time}</small>
                                            <small class="d-block text-muted">最后打印: ${lastPrintTime}</small>
                                        </div>
                                        <div>
                                            <span class="badge bg-success rounded-pill me-2">${file.result_count} 个订单</span>
                                            <button class="btn btn-sm btn-outline-warning reprint-btn" data-hash="${file.hash}" data-filename="${file.filename}">
                                                重新打印
                                            </button>
                                        </div>
                                    </li>
                                `;
                            });
                            fileDetailsHtml += '</ul>';
                        }
                        
                        fileDetailsDiv.innerHTML = fileDetailsHtml;
                    }
                    
                    // 显示订单结果 - 追加新订单到现有结果中
                    // 检查是否已有订单结果区域
                    let ordersDiv = document.getElementById('orders-section');
                    if (!ordersDiv) {
                        // 如果不存在，创建新的订单结果区域
                        ordersDiv = document.createElement('div');
                        ordersDiv.id = 'orders-section';
                        ordersDiv.innerHTML = '<h5>订单处理结果</h5>';
                        ordersDiv.className = 'animate-fade-in';
                        ordersDiv.style.animationDelay = '0.3s';
                        resultList.appendChild(ordersDiv);
                    }
                    
                    // 为本次新处理的订单创建分组
                    const newOrdersGroup = document.createElement('div');
                    newOrdersGroup.className = 'mb-3 animate-fade-in';
                    newOrdersGroup.style.animationDelay = '0.2s';
                    
                    // 添加本次处理的标题
                    const groupTitle = document.createElement('div');
                    groupTitle.className = 'text-muted mb-2';
                    groupTitle.innerHTML = `<small>📁 本次处理 (${newFilesCount} 个订单)</small>`;
                    newOrdersGroup.appendChild(groupTitle);
                    
                    // 显示本次新处理的订单
                    response.results.forEach(function(result, index) {
                        const fileItem = document.createElement('div');
                        fileItem.className = 'file-item animate-slide-in';
                        // 设置延迟动画，使订单依次显示
                        fileItem.style.animationDelay = (0.3 + index * 0.1) + 's';
                        
                        let statusIcon = '';
                        if (result.has_itinerary && result.has_invoice) {
                            statusIcon = '<span class="text-success">✓ 完整</span>';
                        } else if (result.has_itinerary || result.has_invoice) {
                            statusIcon = '<span class="text-warning">⚠ 部分</span>';
                        } else {
                            statusIcon = '<span class="text-danger">✗ 无文件</span>';
                        }
                        
                        fileItem.innerHTML = `
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <strong>订单 ${result.order_id}</strong> ${statusIcon}<br>
                                    <small class="text-muted">金额: ¥${result.amount.toFixed(2)}</small><br>
                                    <small class="text-muted">
                                        行程单: ${result.has_itinerary ? '有' : '无'} | 
                                        发票: ${result.has_invoice ? '有' : '无'}
                                    </small>
                                </div>
                                <div>
                                    <a href="/output/${result.output_file}" target="_blank" class="btn btn-sm btn-outline-primary">预览</a>
                                    <button class="btn btn-sm btn-outline-success print-btn" data-file="${result.output_file}">打印</button>
                                </div>
                            </div>
                        `;
                        
                        newOrdersGroup.appendChild(fileItem);
                    });
                    
                    // 将新订单组添加到订单结果区域
                    ordersDiv.appendChild(newOrdersGroup);
                    
                    // 添加打印按钮事件
                    document.querySelectorAll('.print-btn').forEach(function(btn) {
                        btn.addEventListener('click', function() {
                            const filename = this.getAttribute('data-file');
                            printFile(filename);
                        });
                    });
                    
                    // 添加重新打印按钮事件
                    document.querySelectorAll('.reprint-btn').forEach(function(btn) {
                        btn.addEventListener('click', function() {
                            const fileHash = this.getAttribute('data-hash');
                            const filename = this.getAttribute('data-filename');
                            reprintFile(fileHash, filename);
                        });
                    });
                    
                } else {
                    resultList.innerHTML = '<div class="alert alert-danger">处理文件时出错</div>';
                }
            }
            
            // 打印单个文件
            function printFile(filename) {
                const printBtn = document.querySelector(`.print-btn[data-file="${filename}"]`);
                if (printBtn) {
                    // 添加加载动画
                    const originalText = printBtn.innerHTML;
                    printBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> 打印中...';
                    printBtn.disabled = true;
                }
                
                fetch(`/api/print/${filename}`, {
                    method: 'POST'
                })
                .then(response => response.json())
                .then(data => {
                    if (printBtn) {
                        // 恢复按钮状态
                        printBtn.innerHTML = '打印';
                        printBtn.disabled = false;
                    }
                    
                    if (data.success) {
                        // 显示打印成功通知，包含打印机信息
                        let message = `文件已发送至打印机: ${data.printer}`;
                        if (data.job_id) {
                            message += `，任务ID: ${data.job_id}`;
                        }
                        if (data.debug) {
                            showNotification('调试模式：模拟打印成功', 'info');
                        } else {
                            showNotification(message, 'success');
                        }
                    } else {
                        showNotification('打印失败: ' + (data.message || '未知错误'), 'error');
                    }
                })
                .catch(error => {
                    if (printBtn) {
                        // 恢复按钮状态
                        printBtn.innerHTML = '打印';
                        printBtn.disabled = false;
                    }
                    showNotification('打印请求出错: ' + error, 'error');
                });
            }
            
            // 重新打印文件
            function reprintFile(fileHash, filename) {
                // 从DOM中获取订单数量
                const reprintBtn = document.querySelector(`.reprint-btn[data-hash="${fileHash}"]`);
                const orderCountElement = reprintBtn?.closest('.list-group-item')?.querySelector('.badge.bg-success');
                const orderCount = orderCountElement ? orderCountElement.textContent.replace(' 个订单', '') : '0';
                
                const confirmMessage = `文件 "${filename}" 已上传过，是否要重新打印？\n\n这将打印该文件中的所有 ${orderCount} 个订单。`;
                
                if (confirm(confirmMessage)) {
                    const reprintBtn = document.querySelector(`.reprint-btn[data-hash="${fileHash}"]`);
                    if (reprintBtn) {
                        // 添加加载动画
                        const originalText = reprintBtn.innerHTML;
                        reprintBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> 打印中...';
                        reprintBtn.disabled = true;
                    }
                    
                    fetch(`/api/reprint/${fileHash}`, {
                        method: 'POST'
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (reprintBtn) {
                            // 恢复按钮状态
                            reprintBtn.innerHTML = '重新打印';
                            reprintBtn.disabled = false;
                        }
                        
                        if (data.success) {
                            showNotification(`重新打印成功！成功打印 ${data.success_count}/${data.total_files} 个文件`, 'success');
                            
                            // 更新UI状态
                            setTimeout(() => {
                                location.reload(); // 刷新页面以更新状态
                            }, 2000);
                        } else {
                            showNotification('重新打印失败: ' + (data.message || '未知错误'), 'error');
                        }
                    })
                    .catch(error => {
                        if (reprintBtn) {
                            // 恢复按钮状态
                            reprintBtn.innerHTML = '重新打印';
                            reprintBtn.disabled = false;
                        }
                        showNotification('重新打印请求出错: ' + error, 'error');
                    });
                }
            }
            
            // 清空结果
            document.getElementById('clearResultsBtn').addEventListener('click', function() {
                if (confirm('确定要清空所有处理结果吗？这将清空所有已处理的订单信息。')) {
                    // 清空结果列表
                    resultList.innerHTML = '';
                    // 重置处理文件数组
                    processedFiles = [];
                    // 重置重用文件数组
                    if (typeof window.allReusedFiles !== 'undefined') {
                        window.allReusedFiles = [];
                    }
                    // 显示通知
                    showNotification('已清空所有处理结果', 'info');
                }
            });
            
            // 打印全部文件
            printAllBtn.addEventListener('click', function() {
                if (processedFiles.length === 0) {
                    showNotification('没有可打印的文件', 'warning');
                    return;
                }
                
                if (confirm(`确定要打印全部 ${processedFiles.length} 个文件吗？`)) {
                    let printedCount = 0;
                    let successCount = 0;
                    let failCount = 0;
                    
                    // 添加加载动画
                    const originalText = printAllBtn.innerHTML;
                    printAllBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> 打印中...';
                    printAllBtn.disabled = true;
                    
                    processedFiles.forEach(function(file) {
                        fetch(`/api/print/${file.output_file}`, {
                            method: 'POST'
                        })
                        .then(response => response.json())
                        .then(data => {
                            printedCount++;
                            if (data.success) {
                                successCount++;
                            } else {
                                failCount++;
                            }
                            
                            if (printedCount === processedFiles.length) {
                                // 恢复按钮状态
                                printAllBtn.innerHTML = originalText;
                                printAllBtn.disabled = false;
                                
                                // 显示打印结果通知
                                let message = `打印完成: ${successCount}个成功`;
                                if (failCount > 0) {
                                    message += `, ${failCount}个失败`;
                                    showNotification(message, failCount > successCount ? 'warning' : 'success');
                                } else {
                                    showNotification(message, 'success');
                                }
                            }
                        })
                        .catch(error => {
                            printedCount++;
                            failCount++;
                            
                            if (printedCount === processedFiles.length) {
                                // 恢复按钮状态
                                printAllBtn.innerHTML = originalText;
                                printAllBtn.disabled = false;
                                
                                // 显示打印结果通知
                                let message = `打印完成: ${successCount}个成功`;
                                if (failCount > 0) {
                                    message += `, ${failCount}个失败`;
                                    showNotification(message, failCount > successCount ? 'warning' : 'success');
                                }
                            }
                            console.error('打印请求出错:', error);
                        });
                    });
                }
            });
        });
    </script>
</body>
</html>
