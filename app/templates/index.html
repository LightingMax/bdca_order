<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单报销系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f5f5f5;
            padding-top: 20px;
        }
        .container {
            max-width: 800px;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 5px;
            padding: 25px;
            text-align: center;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:hover {
            border-color: #007bff;
            background-color: #f8f9fa;
        }
        .upload-area.highlight {
            border-color: #28a745;
            background-color: #e8f4ea;
        }
        .progress {
            display: none;
            margin: 20px 0;
        }
        .result-area {
            display: none;
            margin-top: 20px;
        }
        .file-item {
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        .nav-tabs {
            margin-bottom: 20px;
        }
        /* 添加动画效果 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        @keyframes slideIn {
            from { transform: translateX(-30px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        
        .animate-pulse {
            animation: pulse 1s infinite;
        }
        
        .animate-slide-in {
            animation: slideIn 0.4s ease-out;
        }
        
        .file-item {
            transition: all 0.3s ease;
        }
        
        .file-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        
        .upload-success {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #28a745;
            color: white;
            padding: 15px 20px;
            border-radius: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 1000;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.5s ease;
        }
        
        .upload-success.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4">打车行程单和发票文件处理系统</h1>
        
        <ul class="nav nav-tabs">
            <li class="nav-item">
                <a class="nav-link active" href="/">处理文件</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/statistics">统计数据</a>
            </li>
        </ul>
        
        <div class="upload-area" id="uploadArea">
            <h3>拖拽ZIP文件到此处或点击上传</h3>
            <p class="text-muted">支持的文件格式: .zip (可同时上传多个文件)</p>
            <input type="file" id="fileInput" accept=".zip" multiple style="display: none;">
        </div>
        
        <div id="fileList" class="mb-3" style="display: none;">
            <h4>选择的文件</h4>
            <ul class="list-group" id="selectedFiles"></ul>
        </div>
        
        <div class="progress">
            <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%"></div>
        </div>
        
        <div class="result-area">
            <h3>处理结果</h3>
            <div id="resultList" class="mt-3"></div>
            <button id="printAllBtn" class="btn btn-primary mt-3">打印全部</button>
        </div>
    </div>
    
    <!-- 上传成功通知 -->
    <div id="uploadSuccess" class="upload-success">
        <i class="bi bi-check-circle-fill me-2"></i> 上传成功！
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Bootstrap 图标 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');
            const progressBar = document.querySelector('.progress-bar');
            const progress = document.querySelector('.progress');
            const resultArea = document.querySelector('.result-area');
            const resultList = document.getElementById('resultList');
            const printAllBtn = document.getElementById('printAllBtn');
            
            let processedFiles = [];
            
            // 页面加载动画
            function initPageAnimations() {
                document.querySelector('h1').classList.add('animate-fade-in');
                document.querySelector('.nav-tabs').classList.add('animate-fade-in');
                document.querySelector('.nav-tabs').style.animationDelay = '0.1s';
                
                uploadArea.classList.add('animate-fade-in');
                uploadArea.style.animationDelay = '0.2s';
            }
            
            // 初始化页面动画
            initPageAnimations();
            
            // 点击上传区域触发文件选择
            uploadArea.addEventListener('click', function() {
                fileInput.click();
            });
            
            // 文件拖拽事件
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                uploadArea.addEventListener(eventName, preventDefaults, false);
            });
            
            function preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }
            
            ['dragenter', 'dragover'].forEach(eventName => {
                uploadArea.addEventListener(eventName, highlight, false);
            });
            
            ['dragleave', 'drop'].forEach(eventName => {
                uploadArea.addEventListener(eventName, unhighlight, false);
            });
            
            function highlight() {
                uploadArea.classList.add('highlight');
                // 添加脉冲动画
                uploadArea.classList.add('animate-pulse');
            }
            
            function unhighlight() {
                uploadArea.classList.remove('highlight');
                // 移除脉冲动画
                uploadArea.classList.remove('animate-pulse');
            }
            
            // 处理拖放的文件
            uploadArea.addEventListener('drop', handleDrop, false);
            
            function handleDrop(e) {
                const dt = e.dataTransfer;
                const files = dt.files;
                
                if (files.length > 0) {
                    handleFiles(files);
                }
            }
            
            // 处理选择的文件
            fileInput.addEventListener('change', function() {
                if (fileInput.files.length > 0) {
                    handleFiles(fileInput.files);
                }
            });
            
            // 处理文件上传
            function handleFiles(files) {
                if (files.length === 0) {
                    alert('请选择一个ZIP文件');
                    return;
                }
                
                // 验证所有文件都是ZIP格式
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    if (!file.name.toLowerCase().endsWith('.zip')) {
                        alert('请上传ZIP格式的文件');
                        return;
                    }
                }
                
                // 显示选择的文件列表
                const fileList = document.getElementById('fileList');
                const selectedFiles = document.getElementById('selectedFiles');
                selectedFiles.innerHTML = '';
                
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    const li = document.createElement('li');
                    li.className = 'list-group-item d-flex justify-content-between align-items-center animate-fade-in';
                    // 设置延迟动画，使文件依次显示
                    li.style.animationDelay = (i * 0.1) + 's';
                    li.innerHTML = `
                        <span>${file.name}</span>
                        <span class="badge bg-primary rounded-pill">${formatFileSize(file.size)}</span>
                    `;
                    selectedFiles.appendChild(li);
                }
                
                fileList.style.display = 'block';
                fileList.classList.add('animate-fade-in');
                
                uploadFiles(files);
            }
            
            // 格式化文件大小
            function formatFileSize(bytes) {
                if (bytes === 0) return '0 Bytes';
                const k = 1024;
                const sizes = ['Bytes', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            }
            
            // 上传文件到服务器
            function uploadFiles(files) {
                const formData = new FormData();
                for (let i = 0; i < files.length; i++) {
                    formData.append('files', files[i]);
                }
                
                const xhr = new XMLHttpRequest();
                
                // 进度条显示
                progress.style.display = 'flex';
                resultArea.style.display = 'none';
                
                xhr.upload.addEventListener('progress', function(e) {
                    if (e.lengthComputable) {
                        const percentComplete = (e.loaded / e.total) * 100;
                        progressBar.style.width = percentComplete + '%';
                        
                        // 添加进度条颜色变化
                        if (percentComplete < 30) {
                            progressBar.className = 'progress-bar progress-bar-striped progress-bar-animated bg-info';
                        } else if (percentComplete < 70) {
                            progressBar.className = 'progress-bar progress-bar-striped progress-bar-animated bg-primary';
                        } else {
                            progressBar.className = 'progress-bar progress-bar-striped progress-bar-animated bg-success';
                        }
                    }
                });
                
                xhr.addEventListener('load', function() {
                    if (xhr.status === 200) {
                        const response = JSON.parse(xhr.responseText);
                        
                        // 显示上传成功通知
                        const uploadSuccess = document.getElementById('uploadSuccess');
                        uploadSuccess.classList.add('show');
                        setTimeout(() => {
                            uploadSuccess.classList.remove('show');
                        }, 3000);
                        
                        displayResults(response);
                    } else {
                        let errorMessage = '上传失败';
                        try {
                            const response = JSON.parse(xhr.responseText);
                            errorMessage = response.error || errorMessage;
                        } catch (e) {}
                        alert(errorMessage);
                        progress.style.display = 'none';
                        document.getElementById('fileList').style.display = 'none';
                    }
                });
                
                xhr.addEventListener('error', function() {
                    alert('上传过程中发生错误');
                    progress.style.display = 'none';
                    document.getElementById('fileList').style.display = 'none';
                });
                
                xhr.open('POST', '/api/upload');
                xhr.send(formData);
            }
            
            // 显示处理结果
            function displayResults(response) {
                progress.style.display = 'none';
                resultArea.style.display = 'block';
                resultArea.classList.add('animate-fade-in');
                resultList.innerHTML = '';
                
                // 隐藏文件列表
                document.getElementById('fileList').style.display = 'none';
                
                if (response.success && response.results) {
                    processedFiles = response.results;
                    
                    // 显示总处理结果统计
                    const totalFiles = response.results.length;
                    const totalAmount = response.total_amount || response.results.reduce((sum, result) => sum + result.amount, 0);
                    
                    const summaryDiv = document.createElement('div');
                    summaryDiv.className = 'alert alert-success mb-3 animate-fade-in';
                    
                    // 添加重用文件信息和新处理订单信息
                    let summaryText = `成功处理 <strong>${totalFiles}</strong> 个订单，总金额: <strong>¥${totalAmount.toFixed(2)}</strong>`;
                    
                    if (response.reused_files > 0 && response.new_results_count >= 0) {
                        summaryText += `<br><small>其中 ${response.reused_files} 个文件已上传过，重用了之前的处理结果</small>`;
                        
                        if (response.new_results_count > 0) {
                            summaryText += `<br><small>本次新处理 <strong>${response.new_results_count}</strong> 个订单，这些订单已计入统计</small>`;
                        } else {
                            summaryText += `<br><small class="text-warning">所有订单均为重复上传，统计数据未增加</small>`;
                        }
                    }
                    
                    summaryDiv.innerHTML = summaryText;
                    resultList.appendChild(summaryDiv);
                    
                    // 显示文件重用详情
                    if (response.file_details && (response.file_details.reused.length > 0 || response.file_details.processed.length > 0)) {
                        const fileDetailsDiv = document.createElement('div');
                        fileDetailsDiv.className = 'mb-4 animate-fade-in';
                        fileDetailsDiv.style.animationDelay = '0.2s';
                        
                        let fileDetailsHtml = '<h5>文件处理详情</h5>';
                        
                        // 新处理的文件
                        if (response.file_details.processed.length > 0) {
                            fileDetailsHtml += '<div class="mb-2"><strong>新处理的文件:</strong></div>';
                            fileDetailsHtml += '<ul class="list-group mb-3">';
                            response.file_details.processed.forEach((file, index) => {
                                const newBadge = file.new_result_count ? 
                                    `<span class="badge bg-success ms-2">+${file.new_result_count} 新订单</span>` : 
                                    '<span class="badge bg-secondary ms-2">无新订单</span>';
                                
                                fileDetailsHtml += `
                                    <li class="list-group-item d-flex justify-content-between align-items-center animate-slide-in" style="animation-delay: ${0.2 + index * 0.1}s">
                                        <div>
                                            <span>${file.filename} ${newBadge}</span>
                                            <small class="d-block text-muted">哈希: ${file.hash.substring(0, 8)}...${file.hash.substring(file.hash.length - 8)}</small>
                                        </div>
                                        <span class="badge bg-primary rounded-pill">${file.result_count} 个订单</span>
                                    </li>
                                `;
                            });
                            fileDetailsHtml += '</ul>';
                        }
                        
                        // 重用的文件
                        if (response.file_details.reused.length > 0) {
                            fileDetailsHtml += '<div class="mb-2"><strong>重用的文件:</strong></div>';
                            fileDetailsHtml += '<ul class="list-group">';
                            response.file_details.reused.forEach((file, index) => {
                                fileDetailsHtml += `
                                    <li class="list-group-item d-flex justify-content-between align-items-center animate-slide-in" style="animation-delay: ${0.2 + index * 0.1}s">
                                        <div>
                                            <span>${file.filename}</span>
                                            <small class="d-block text-muted">哈希: ${file.hash.substring(0, 8)}...${file.hash.substring(file.hash.length - 8)}</small>
                                            <small class="d-block text-muted">原上传时间: ${file.original_upload_time}</small>
                                        </div>
                                        <span class="badge bg-success rounded-pill">${file.result_count} 个订单</span>
                                    </li>
                                `;
                            });
                            fileDetailsHtml += '</ul>';
                        }
                        
                        fileDetailsDiv.innerHTML = fileDetailsHtml;
                        resultList.appendChild(fileDetailsDiv);
                    }
                    
                    // 显示订单结果
                    const ordersDiv = document.createElement('div');
                    ordersDiv.innerHTML = '<h5>订单处理结果</h5>';
                    ordersDiv.className = 'animate-fade-in';
                    ordersDiv.style.animationDelay = '0.3s';
                    resultList.appendChild(ordersDiv);
                    
                    response.results.forEach(function(result, index) {
                        const fileItem = document.createElement('div');
                        fileItem.className = 'file-item animate-slide-in';
                        // 设置延迟动画，使订单依次显示
                        fileItem.style.animationDelay = (0.3 + index * 0.1) + 's';
                        
                        let statusIcon = '';
                        if (result.has_itinerary && result.has_invoice) {
                            statusIcon = '<span class="text-success">✓ 完整</span>';
                        } else if (result.has_itinerary || result.has_invoice) {
                            statusIcon = '<span class="text-warning">⚠ 部分</span>';
                        } else {
                            statusIcon = '<span class="text-danger">✗ 无文件</span>';
                        }
                        
                        fileItem.innerHTML = `
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <strong>订单 ${result.order_id}</strong> ${statusIcon}<br>
                                    <small class="text-muted">金额: ¥${result.amount.toFixed(2)}</small><br>
                                    <small class="text-muted">
                                        行程单: ${result.has_itinerary ? '有' : '无'} | 
                                        发票: ${result.has_invoice ? '有' : '无'}
                                    </small>
                                </div>
                                <div>
                                    <a href="/output/${result.output_file}" target="_blank" class="btn btn-sm btn-outline-primary">预览</a>
                                    <button class="btn btn-sm btn-outline-success print-btn" data-file="${result.output_file}">打印</button>
                                </div>
                            </div>
                        `;
                        
                        resultList.appendChild(fileItem);
                    });
                    
                    // 添加打印按钮事件
                    document.querySelectorAll('.print-btn').forEach(function(btn) {
                        btn.addEventListener('click', function() {
                            const filename = this.getAttribute('data-file');
                            printFile(filename);
                        });
                    });
                    
                } else {
                    resultList.innerHTML = '<div class="alert alert-danger">处理文件时出错</div>';
                }
            }
            
            // 打印单个文件
            function printFile(filename) {
                const printBtn = document.querySelector(`.print-btn[data-file="${filename}"]`);
                if (printBtn) {
                    // 添加加载动画
                    const originalText = printBtn.innerHTML;
                    printBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> 打印中...';
                    printBtn.disabled = true;
                }
                
                fetch(`/api/print/${filename}`, {
                    method: 'POST'
                })
                .then(response => response.json())
                .then(data => {
                    if (printBtn) {
                        // 恢复按钮状态
                        printBtn.innerHTML = '打印';
                        printBtn.disabled = false;
                    }
                    
                    if (data.success) {
                        // 显示成功通知
                        const uploadSuccess = document.getElementById('uploadSuccess');
                        uploadSuccess.innerHTML = '<i class="bi bi-printer-fill me-2"></i> 文件已发送至打印机';
                        uploadSuccess.classList.add('show');
                        setTimeout(() => {
                            uploadSuccess.classList.remove('show');
                        }, 3000);
                    } else {
                        alert('打印失败: ' + (data.error || '未知错误'));
                    }
                })
                .catch(error => {
                    if (printBtn) {
                        // 恢复按钮状态
                        printBtn.innerHTML = '打印';
                        printBtn.disabled = false;
                    }
                    alert('打印请求出错: ' + error);
                });
            }
            
            // 打印全部文件
            printAllBtn.addEventListener('click', function() {
                if (processedFiles.length === 0) {
                    alert('没有可打印的文件');
                    return;
                }
                
                if (confirm(`确定要打印全部 ${processedFiles.length} 个文件吗？`)) {
                    let printedCount = 0;
                    
                    // 添加加载动画
                    const originalText = printAllBtn.innerHTML;
                    printAllBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> 打印中...';
                    printAllBtn.disabled = true;
                    
                    processedFiles.forEach(function(file) {
                        fetch(`/api/print/${file.output_file}`, {
                            method: 'POST'
                        })
                        .then(response => response.json())
                        .then(data => {
                            printedCount++;
                            if (printedCount === processedFiles.length) {
                                // 恢复按钮状态
                                printAllBtn.innerHTML = originalText;
                                printAllBtn.disabled = false;
                                
                                // 显示成功通知
                                const uploadSuccess = document.getElementById('uploadSuccess');
                                uploadSuccess.innerHTML = '<i class="bi bi-printer-fill me-2"></i> 所有文件已发送至打印机';
                                uploadSuccess.classList.add('show');
                                setTimeout(() => {
                                    uploadSuccess.classList.remove('show');
                                }, 3000);
                            }
                        })
                        .catch(error => {
                            printedCount++;
                            if (printedCount === processedFiles.length) {
                                // 恢复按钮状态
                                printAllBtn.innerHTML = originalText;
                                printAllBtn.disabled = false;
                            }
                            console.error('打印请求出错:', error);
                        });
                    });
                }
            });
        });
    </script>
</body>
</html>
