<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统计数据 - 订单报销系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f5f5f5;
            padding-top: 20px;
        }
        .container {
            max-width: 800px;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .nav-tabs {
            margin-bottom: 20px;
        }
        .stats-card {
            background-color: #f8f9fa;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #007bff;
        }
        .total-stats {
            background-color: #e9f7ef;
            border-radius: 5px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        .stats-number {
            font-size: 24px;
            font-weight: bold;
            color: #28a745;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4">订单报销系统</h1>
        
        <ul class="nav nav-tabs">
            <li class="nav-item">
                <a class="nav-link" href="/">处理文件</a>
            </li>
            <li class="nav-item">
                <a class="nav-link active" href="/statistics">统计数据</a>
            </li>
        </ul>
        
        <div class="total-stats">
            <div class="row">
                <div class="col-md-6">
                    <h5>总打印次数</h5>
                    <div class="stats-number" id="totalPrints">0</div>
                </div>
                <div class="col-md-6">
                    <h5>总金额 (元)</h5>
                    <div class="stats-number" id="totalAmount">¥0.00</div>
                </div>
            </div>
        </div>
        
        <h3>用户打印统计</h3>
        <div id="userStatsList"></div>
        
        <div class="text-center mt-4">
            <button id="refreshBtn" class="btn btn-outline-primary">刷新数据</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const userStatsList = document.getElementById('userStatsList');
            const totalPrints = document.getElementById('totalPrints');
            const totalAmount = document.getElementById('totalAmount');
            const refreshBtn = document.getElementById('refreshBtn');
            
            // 加载统计数据
            function loadStatistics() {
                fetch('/api/statistics')
                    .then(response => response.json())
                    .then(data => {
                        displayStatistics(data);
                    })
                    .catch(error => {
                        console.error('获取统计数据出错:', error);
                        userStatsList.innerHTML = '<div class="alert alert-danger">获取统计数据失败</div>';
                    });
            }
            
            // 显示统计数据
            function displayStatistics(data) {
                userStatsList.innerHTML = '';
                
                if (!data || data.length === 0) {
                    userStatsList.innerHTML = '<div class="alert alert-info">暂无打印记录</div>';
                    totalPrints.textContent = '0';
                    totalAmount.textContent = '¥0.00';
                    return;
                }
                
                // 计算总计
                let allPrints = 0;
                let allAmount = 0;
                
                data.forEach(function(user) {
                    allPrints += user.total_prints || 0;
                    allAmount += user.total_amount || 0;
                    
                    const userCard = document.createElement('div');
                    userCard.className = 'stats-card';
                    
                    // 截断用户ID显示
                    const shortUserId = user.user_id.length > 12 
                        ? user.user_id.substring(0, 6) + '...' + user.user_id.substring(user.user_id.length - 6)
                        : user.user_id;
                    
                    userCard.innerHTML = `
                        <div class="row">
                            <div class="col-md-6">
                                <h5>用户ID: ${shortUserId}</h5>
                                <p class="text-muted mb-0">最后打印时间: ${user.last_print || '未知'}</p>
                            </div>
                            <div class="col-md-6 text-md-end">
                                <p class="mb-0">打印次数: <strong>${user.total_prints || 0}</strong></p>
                                <p class="mb-0">总金额: <strong>¥${(user.total_amount || 0).toFixed(2)}</strong></p>
                            </div>
                        </div>
                    `;
                    
                    userStatsList.appendChild(userCard);
                });
                
                // 更新总计
                totalPrints.textContent = allPrints;
                totalAmount.textContent = '¥' + allAmount.toFixed(2);
            }
            
            // 刷新按钮点击事件
            refreshBtn.addEventListener('click', function() {
                loadStatistics();
            });
            
            // 初始加载
            loadStatistics();
        });
    </script>
</body>
</html>
