<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重复显示修复测试</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .upload-area { border: 2px dashed #ccc; padding: 40px; text-align: center; margin: 20px 0; }
        .upload-area.dragover { border-color: #007bff; background: #f8f9fa; }
        .result-area { margin: 20px 0; padding: 15px; background: #e9ecef; border-radius: 5px; }
        .result-list { margin: 20px 0; padding: 15px; background: #f0f0f0; border-radius: 5px; }
        .log { background: #f0f0f0; padding: 10px; margin: 5px 0; border-radius: 3px; font-size: 12px; }
        .alert { padding: 15px; margin: 10px 0; border-radius: 5px; }
        .alert-success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
    </style>
</head>
<body>
    <h1>重复显示修复测试</h1>
    
    <div class="upload-area" id="uploadArea">
        <h3>拖拽ZIP文件到此处测试</h3>
        <p>测试修复后的逻辑：统计信息应该只显示一次，订单结果应该追加显示</p>
    </div>
    
    <div class="result-area" id="resultArea">
        <h3>结果区域</h3>
        <div class="result-list" id="resultList">
            <p>初始内容 - 这里应该保持不变</p>
        </div>
    </div>
    
    <div class="result-area">
        <h3>操作日志</h3>
        <div id="logContent"></div>
    </div>

    <script>
        let logCount = 0;
        let uploadCount = 0;
        let processedFiles = [];
        
        function addLog(message) {
            logCount++;
            const timestamp = new Date().toLocaleTimeString();
            const logDiv = document.createElement('div');
            logDiv.className = 'log';
            logDiv.innerHTML = `${logCount}. ${timestamp} - ${message}`;
            document.getElementById('logContent').appendChild(logDiv);
        }
        
        // 模拟 displayResults 函数 - 使用修复后的逻辑
        function displayResults(response) {
            addLog('🔄 displayResults 被调用');
            addLog(`📊 当前 processedFiles 长度: ${processedFiles.length}`);
            addLog(`📊 显示结果前 resultList 内容长度: ${resultList.innerHTML.length}`);
            
            // 显示结果区域
            addLog('✅ 显示结果区域');
            resultArea.style.display = 'block';
            
            if (response.success && response.results) {
                addLog('✅ 响应成功，开始处理结果');
                
                // 将新结果添加到现有结果中，而不是替换
                if (typeof processedFiles === 'undefined') {
                    addLog('🆕 processedFiles 未定义，初始化为空数组');
                    processedFiles = [];
                }
                
                addLog(`📥 添加新结果前，processedFiles 长度: ${processedFiles.length}`);
                const newResults = response.results || [];
                processedFiles = processedFiles.concat(newResults);
                addLog(`📤 添加新结果后，processedFiles 长度: ${processedFiles.length}`);
                
                // 显示本次处理结果统计
                const newFilesCount = newResults.length;
                const newAmount = response.total_amount || newResults.reduce((sum, result) => sum + (result.amount || 0), 0);
                
                // 计算累计统计
                const totalFiles = processedFiles.length;
                const totalAmount = processedFiles.reduce((sum, result) => sum + (result.amount || 0), 0);
                
                addLog(`📊 统计信息 - 本次: ${newFilesCount}, 累计: ${totalFiles}, 总金额: ${totalAmount}`);
                
                // 检查是否已经有统计摘要，如果有则更新，没有则创建新的
                let summaryDiv = document.getElementById('current-summary');
                if (!summaryDiv) {
                    addLog('🆕 创建新的统计摘要');
                    summaryDiv = document.createElement('div');
                    summaryDiv.className = 'alert alert-success mb-3';
                    summaryDiv.id = 'current-summary';
                    resultList.appendChild(summaryDiv);
                } else {
                    addLog('🔄 更新现有统计摘要');
                }
                
                // 更新统计摘要内容
                let summaryText = `本次处理 <strong>${newFilesCount}</strong> 个订单，金额: <strong>¥${newAmount.toFixed(2)}</strong>`;
                summaryText += `<br><small>累计处理 <strong>${totalFiles}</strong> 个订单，总金额: <strong>¥${totalAmount.toFixed(2)}</strong></small>`;
                
                if (response.reused_files > 0 && response.new_results_count >= 0) {
                    summaryText += `<br><small>其中 ${response.reused_files} 个文件已上传过，重用了之前的处理结果</small>`;
                    
                    if (response.new_results_count > 0) {
                        summaryText += `<br><small>本次新处理 <strong>${response.new_results_count}</strong> 个订单，这些订单已计入统计</small>`;
                    } else {
                        summaryText += `<br><small class="text-warning">所有订单均为重复上传，统计数据未增加</small>`;
                    }
                }
                
                summaryDiv.innerHTML = summaryText;
                addLog('✅ 统计摘要已更新');
                
                // 显示订单结果 - 追加新订单到现有结果中
                let ordersDiv = document.getElementById('orders-section');
                if (!ordersDiv) {
                    addLog('🆕 创建新的订单结果区域');
                    ordersDiv = document.createElement('div');
                    ordersDiv.id = 'orders-section';
                    ordersDiv.innerHTML = '<h5>订单处理结果</h5>';
                    resultList.appendChild(ordersDiv);
                }
                
                // 为本次新处理的订单创建分组
                const newOrdersGroup = document.createElement('div');
                newOrdersGroup.className = 'mb-3';
                newOrdersGroup.innerHTML = `<h6>📁 第${uploadCount}次上传 (${newFilesCount} 个订单)</h6>`;
                
                // 显示本次新处理的订单
                newResults.forEach(function(result, index) {
                    const fileItem = document.createElement('div');
                    fileItem.className = 'file-item';
                    fileItem.innerHTML = `
                        <div style="padding: 10px; border: 1px solid #ddd; margin: 5px 0; border-radius: 3px;">
                            <strong>订单 ${result.order_id || '未知'}</strong><br>
                            <small>金额: ¥${result.amount || 0}</small><br>
                            <small>状态: ${result.has_itinerary && result.has_invoice ? '✓ 完整' : '⚠ 部分'}</small>
                        </div>
                    `;
                    newOrdersGroup.appendChild(fileItem);
                });
                
                ordersDiv.appendChild(newOrdersGroup);
                addLog(`✅ 已添加 ${newFilesCount} 个订单到结果区域`);
            }
        }
        
        // 模拟 uploadFiles 函数
        function uploadFiles(files) {
            addLog('🚀 uploadFiles 开始');
            addLog(`📊 上传前 processedFiles 长度: ${processedFiles.length}`);
            addLog(`📊 上传前 resultList 内容长度: ${resultList.innerHTML.length}`);
            
            // 模拟上传延迟
            setTimeout(() => {
                uploadCount++;
                
                // 模拟服务器响应
                const mockResponse = {
                    success: true,
                    results: [
                        { 
                            order_id: `订单${uploadCount}_1`, 
                            amount: 53.21, 
                            has_itinerary: true, 
                            has_invoice: true 
                        },
                        { 
                            order_id: `订单${uploadCount}_2`, 
                            amount: 45.67, 
                            has_itinerary: true, 
                            has_invoice: false 
                        }
                    ],
                    reused_files: 0,
                    new_results_count: 2
                };
                
                addLog(`📤 模拟上传完成，调用 displayResults`);
                displayResults(mockResponse);
                
            }, 1000);
        }
        
        // 页面加载事件
        addLog('页面加载完成');
        
        // 拖拽事件
        const uploadArea = document.getElementById('uploadArea');
        
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            uploadArea.addEventListener(eventName, (e) => {
                e.preventDefault();
                e.stopPropagation();
            });
        });
        
        ['dragenter', 'dragover'].forEach(eventName => {
            uploadArea.addEventListener(eventName, () => {
                uploadArea.classList.add('dragover');
                addLog('文件拖拽进入区域');
            });
        });
        
        ['dragleave', 'drop'].forEach(eventName => {
            uploadArea.addEventListener(eventName, () => {
                uploadArea.classList.remove('dragover');
                if (eventName === 'drop') {
                    addLog('文件拖拽释放');
                }
            });
        });
        
        // 文件拖拽处理
        uploadArea.addEventListener('drop', (e) => {
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                addLog(`检测到文件: ${files.length} 个文件`);
                uploadFiles(files);
            }
        });
        
        // 添加初始日志
        addLog('测试页面初始化完成');
        addLog('请拖拽ZIP文件到上方区域进行测试');
        addLog('观察统计信息是否只显示一次，订单结果是否追加显示');
    </script>
</body>
</html>
